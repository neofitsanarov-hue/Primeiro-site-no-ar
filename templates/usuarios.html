<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Usuários</title>

<style>

body{
    font-family:Segoe UI;
    background:#0f172a;
    color:white;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:12px;
    border-bottom:1px solid #334155;
}

a{
    color:white;
    text-decoration:none;
}

.btn{
    background:#dc2626;
    padding:8px 12px;
    border-radius:6px;
}

.btn:hover{
    background:#b91c1c;
}

.voltar{
    display:inline-block;
    margin-top:20px;
}

</style>

</head>
<body>

<div class="container">

<h1>Usuários do Sistema</h1>

<div class="card">

    <table>

        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Ações</th>
        </tr>

        {% for u in usuarios %}

        <tr>
            <td>{{ u[0] }}</td>
            <td>{{ u[1] }}</td>
            <td>{{ u[2] }}</td>
            <td>
                <a class="btn"
                   href="/excluir_usuario/{{ u[0] }}"
                   onclick="return confirm('Excluir usuário?')">
                   Excluir
                </a>
            </td>
        </tr>

        {% endfor %}

    </table>

</div>

<a class="voltar" href="/painel">← Voltar</a>

</div>

</body>
</html>
